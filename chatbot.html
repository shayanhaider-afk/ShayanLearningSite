<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Tutor | Shayan's Smart World</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 flex justify-center items-center h-screen">

<div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-lg flex flex-col">
  
  <!-- Header -->
  <div class="p-4 border-b dark:border-gray-700 font-bold text-center">
    🤖 AI Tutor
    <p class="text-sm text-gray-500 dark:text-gray-400">
      Ask me anything. Lessons, jokes, help.
    </p>
  </div>

  <!-- Chat -->
  <div id="chat" class="flex-1 p-4 overflow-y-auto space-y-3 text-sm">
    <div class="bg-gray-200 dark:bg-gray-700 p-3 rounded-lg">
      Hello 👋  
      I’m your AI tutor.  
      What do you want to learn today?
    </div>
  </div>

  <!-- Input -->
  <div class="p-3 border-t dark:border-gray-700 flex gap-2">
    <input id="input" type="text" placeholder="Ask anything..."
      class="flex-1 px-3 py-2 rounded-lg border dark:bg-gray-900 dark:border-gray-600 outline-none">
    <button onclick="sendMessage()"
      class="px-4 py-2 bg-blue-600 text-white rounded-lg">
      Send
    </button>
  </div>

</div>
<!-- Chatbot HTML -->
<div id="chatbot" class="fixed bottom-4 right-4 w-80 bg-white dark:bg-gray-800 shadow-lg rounded-xl overflow-hidden flex flex-col border border-gray-300 dark:border-gray-700">
  <div class="bg-primary-600 dark:bg-primary-400 text-white font-bold p-3 flex justify-between items-center">
    Chat with ShayanBot
    <button id="closeChat" class="font-bold">✖</button>
  </div>
  <div id="chatMessages" class="p-3 flex-1 overflow-y-auto h-64 space-y-2"></div>
  <div class="p-3 border-t border-gray-200 dark:border-gray-700 flex">
    <input type="text" id="chatInput" class="flex-1 p-2 rounded-md border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100" placeholder="Type your message..." />
    <button id="sendChat" class="ml-2 px-3 py-2 bg-primary-600 dark:bg-primary-400 text-white rounded-md">Send</button>
  </div>
</div>
<button id="openChat" class="fixed bottom-4 right-4 bg-primary-600 dark:bg-primary-400 text-white px-4 py-2 rounded-full shadow-lg">Chat</button>


<script>
function addMessage(text, isUser=false) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = isUser
    ? "bg-blue-600 text-white p-3 rounded-lg self-end"
    : "bg-gray-200 dark:bg-gray-700 p-3 rounded-lg";
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, true);
  input.value = "";

  // Fake AI response for now
  setTimeout(() => {
    addMessage("I am thinking 🤔 (AI API will answer here)");
  }, 600);
}
</script>

</body>
</html>
